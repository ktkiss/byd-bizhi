name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Download gradle-wrapper.jar
      run: |
        curl -L -o gradle-wrapper.jar https://raw.githubusercontent.com/nicupavel/gradle-wrapper-jar/main/gradle-wrapper.jar
        mkdir -p gradle/wrapper
        mv gradle-wrapper.jar gradle/wrapper/
        ls -la gradle/wrapper/

    - name: Build
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload to Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release delete v1.0.0 --yes || true
        gh release create v1.0.0 --title "BYD Bizhi v1.0.0" --body "Download APK"
        gh release upload v1.0.0 app/build/outputs/apk/debug/app-debug.apk
