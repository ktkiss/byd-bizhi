name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Install Gradle
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O gradle.zip
        unzip -q gradle.zip
        echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH
        gradle --version

    - name: Build
      run: |
        gradle assembleDebug --no-daemon

    - name: Upload to Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release delete v1.0.0 --yes || true
        gh release create v1.0.0 --title "BYD Bizhi v1.0.0" --body "Download APK"
        gh release upload v1.0.0 app/build/outputs/apk/debug/app-debug.apk
