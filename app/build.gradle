plugins {
    id 'com.android.application'
}

android {
    namespace 'com.xiaoke.bizhi'
    compileSdk 30

    defaultConfig {
        applicationId "com.xiaoke.bizhi"
        minSdk 21
        targetSdk 30
        versionCode 90
        versionName "1.0.90"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
